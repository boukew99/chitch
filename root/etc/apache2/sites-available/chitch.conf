<VirtualHost *:80>
    DocumentRoot /srv/chitch/source/public/

    <Directory /srv/chitch/source/public/>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/chitch_error.log
    CustomLog ${APACHE_LOG_DIR}/chitch_access.log combined
</VirtualHost>
